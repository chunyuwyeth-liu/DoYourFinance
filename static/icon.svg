<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Rounded square background with shadow effect -->
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Rounded square background (blue/purple) -->
  <rect x="10" y="10" width="80" height="80" rx="12" ry="12" 
        fill="#635bff" filter="url(#shadow)"/>
  
  <!-- Dollar sign (coral/reddish-orange with white outline) -->
  <text x="50" y="70" font-family="Arial, sans-serif" font-size="60" 
        font-weight="bold" text-anchor="middle" 
        stroke="white" stroke-width="2.5" fill="#ff5630">$</text>
</svg>
